<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Background Circle (Yellow) -->
  <circle cx="200" cy="200" r="200" fill="#f6c301" />

  <!-- Blue Semicircle Arc (Bottom Half) -->
  <path d="M 20 200 A 180 180 0 0 0 380 200" fill="none" stroke="#0047ba" stroke-width="40" />
  
  <!-- Blue Vertical Stem at the bottom -->
  <rect x="180" y="340" width="40" height="60" fill="#0047ba" />

  <!-- Inner Split Circle (Radius 145) -->
  <!-- Top Semicircle (Yellow) -->
  <path d="M 55 200 A 145 145 0 0 1 345 200 Z" fill="#f6c301" />
  <!-- Bottom Semicircle (Red) -->
  <path d="M 55 200 A 145 145 0 0 0 345 200 Z" fill="#c30f14" />

  <!-- White Outer Ring of the Inner Circle -->
  <circle cx="200" cy="200" r="145" fill="none" stroke="#ffffff" stroke-width="10" />

  <!-- White Horizontal Divider Line -->
  <line x1="50" y1="200" x2="350" y2="200" stroke="#ffffff" stroke-width="10" />

  <!-- Typography "Big" (Top) -->
  <text 
    x="200" 
    y="145" 
    font-family="Georgia, 'Times New Roman', serif" 
    font-size="95" 
    font-weight="900" 
    font-style="italic" 
    fill="#c30f14" 
    text-anchor="middle"
    letter-spacing="-2"
  >Big</text>

  <!-- Typography "Bus" (Bottom) -->
  <text 
    x="200" 
    y="275" 
    font-family="Georgia, 'Times New Roman', serif" 
    font-size="95" 
    font-weight="900" 
    font-style="italic" 
    fill="#f6c301" 
    text-anchor="middle"
    letter-spacing="-2"
  >Bus</text>
</svg>
